name: Deploy to AWS

on:
  push:
    branch: ["main"]

jobs:
  deploy:
    runs on: ubuntu-latest
    permission:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with: 
        role-to-assume: arn:aws:iam::515966539109:role/OIDC_UT_DeployRole
        aws-region: us-east-2

    - name: Deploying with SAM
      run: |
        sam build --template-file templates/resource.yml
        sam deploy --resource-template resource-stack --capabilities CAPABILITY_IAM
        
