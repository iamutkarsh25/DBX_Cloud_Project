AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Deploy Lambda directly from folder

Parameters:
  NASAapiKEY:
    Type: String
    Description: API key for NASA API
  
  MandiAPIKEY:
    Type: String
    Description: API key for Mandi API

  AWSPandaslayer:
    Type: String
    Description: ARN for the AWS SDK for Pandas layer

  OIDCRole:
    Type: String
    Description: OIDC role for the Lambda function

  MandiResourceID:
    Type: String
    Description: Resource ID for the Mandi API
  
  AQIAPIKEY:
    Type: String
    Description: API key for AQI API

  AQIResourceID:
    Type: String
    Description: Resource ID for the AQI API

Resources:

  TestLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: test-lambda
      Runtime: python3.12
      Handler: app.handler
      CodeUri: ../lambda/test_lambda/


  NasaIngestionLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nasa-ingestion-lambda
      Runtime: python3.12
      Handler: app.lambda_handler
      CodeUri: ../lambda/nasa_data_ingestion/
      Timeout: 900
      Environment:
        Variables:
          BUCKET_NAME: ut-raw-bucket
          NASA_API_KEY: !Ref NASAapiKEY
      Layers:
        - !Ref AWSPandaslayer
      Role: !Sub arn:aws:iam::515966539109:role/${OIDCRole}
      Events:
        NasaSchedule:
          Type: Schedule
          Properties:
            Schedule: "cron(23 13 * * ? *)"
            Name: "NasaDailyTrigger"
            Description: "Run ingestion daily at 7 PM IST"


  MandiIngestionLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: UT-mandi-gov-ingestion-lambda
      Runtime: python3.12
      Handler: app.lambda_handler
      CodeUri: ../lambda/market_mandi_data_ingestion
      Timeout: 900
      Environment:
        Variables:
          BUCKET_NAME: ut-raw-bucket
          MandiAPIKEY: !Ref MandiAPIKEY
          MandiResourceID: !Ref MandiResourceID
      Layers:
        - !Ref AWSPandaslayer
      Role: !Sub arn:aws:iam::515966539109:role/${OIDCRole}
      Events:
        MandiSchedule:
          Type: Schedule
          Properties:
            Schedule: "cron(30 13 * * ? *)"
            Name: "MandiDailyTrigger"
            Description: "Run ingestion daily at 7 PM IST"

  AQIIngestionLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: UT-aqi-gov-ingestion-lambda
      Runtime: python3.12
      Handler: app.lambda_handler
      CodeUri: ../lambda/AQI_data_ingestion
      Timeout: 900
      Environment:
        Variables:
          BUCKET_NAME: ut-raw-bucket
          AQIAPIKEY: !Ref AQIAPIKEY
          AQIResourceID: !Ref AQIResourceID
      Layers:
        - !Ref AWSPandaslayer
      Role: !Sub arn:aws:iam::515966539109:role/${OIDCRole}
      Events:
        AQISchedule:
          Type: Schedule
          Properties:
            Schedule: "cron(30 13 * * ? *)"
            Name: "AQIDailyTrigger"
            Description: "Run ingestion daily at 7 PM IST"
